<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASKS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="title-block">
    <h1>TASK<span>S.</span></h1>
  </div>
  <div class="date-block" id="dateBlock"></div>
</header>

<div class="stats">
  <div class="stat">
    <strong id="totalCount">0</strong>
    Total
  </div>
  <div class="stat accent">
    <strong id="activeCount">0</strong>
    Active
  </div>
  <div class="stat danger">
    <strong id="doneCount">0</strong>
    Done
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-label">
    <span>Progress</span>
    <span id="progressLabel">0%</span>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <select class="priority-select" id="prioritySelect">
      <option value="medium">⚡ MED</option>
      <option value="high">🔴 HIGH</option>
      <option value="low">🔵 LOW</option>
    </select>
    <input
      class="task-input"
      id="taskInput"
      type="text"
      placeholder="add a new task..."
      maxlength="120"
      autocomplete="off"
    />
    <button class="add-btn" id="addBtn">ADD</button>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="active">Active</button>
  <button class="filter-btn" data-filter="done">Done</button>
  <button class="filter-btn" data-filter="high">🔴 High</button>
  <button class="filter-btn" data-filter="medium">⚡ Med</button>
  <button class="filter-btn" data-filter="low">🔵 Low</button>
  <button class="clear-btn" id="clearDone">Clear done</button>
</div>

<div class="task-list" id="taskList">
  <div class="empty" id="emptyState">
    <div class="empty-icon">◎</div>
    <div>No tasks yet.<br>Add one above.</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
